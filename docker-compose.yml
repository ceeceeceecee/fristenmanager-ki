version: "3.8"

services:
  # PostgreSQL Datenbank
  postgres:
    image: postgres:16-alpine
    container_name: fristenmanager-db
    environment:
      POSTGRES_DB: fristenmanager
      POSTGRES_USER: fristen
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fristenmanager_secure}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fristen -d fristenmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Caching
  redis:
    image: redis:7-alpine
    container_name: fristenmanager-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Streamlit Web-App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fristenmanager-app
    environment:
      - CONFIG_PATH=/app/config/settings.yaml
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=fristenmanager
      - DB_USER=fristen
      - DB_PASSWORD=${DB_PASSWORD:-fristenmanager_secure}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_URL=http://host.docker.internal:11434
    ports:
      - "8501:8501"
    volumes:
      - ./config:/app/config:ro
      - ./uploads:/app/uploads
      - ./prompts:/app/prompts:ro
      - ./email_templates:/app/email_templates:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
